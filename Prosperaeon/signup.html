<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="author" content="Ibrahim Temitope ~ Introibrotech ~ Full Stack Developer"/>
<!-- Meta Description -->
  <meta name="description" content="ProsperAeon is a modern investment platform blending digital innovation with real-world business returns. Join today to grow your wealth through diversified ventures including stock trading, import/export, and more.">

<!-- Meta Keywords -->
  <meta name="keywords" content="ProsperAeon, investment platform, digital wealth, real business profits, forex alternative, stock market, import export investment, passive income, halal investment, online earnings">
  <link rel="icon" href="images/prosperaeon.png"/>
    <title>Signup - ProsperAeon</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body class="dark-theme">
    <div class="signup-container">
        <h2>Sign Up</h2>
        <form id="signupForm">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="tel">Phone Number(+92123456789)</label>
                <input type="tel" id="tel" name="tel" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="referralCode">Referral Code (Optional)</label>
                <input type="text" id="referralCode" name="referralCode">
            </div>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html" class="link">Login</a></p>
    </div>
    <script>
        window.addEventListener("DOMContentLoaded", () => {
          const urlParams = new URLSearchParams(window.location.search);
          const refCode = urlParams.get("ref");
      
          if (refCode) {
            document.getElementById("referralCode").value = refCode;
          }
        });
      </script>
      
    <script>
        // Function to extract referral code from URL (e.g., ?ref=abc123)
        function getReferralCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                // Store referral code in localStorage for later use after signup
                localStorage.setItem('prosperaeon_referral_code', refCode);
                console.log('Referral code saved:', refCode);
            }
        }
        
        // Run it on page load
        window.onload = getReferralCode;
    </script>

    <!-- <script src="auth.js"></script> -->

<script src="signup.js" defer type="module"></script>
    <script type="module" src="supabase.js"></script>   
</body>
</html>
